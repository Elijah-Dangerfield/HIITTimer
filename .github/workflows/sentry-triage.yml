name: Sentry triage (Claude)

on:
  schedule:
    - cron: '0 14 * * 1'  # Monday 14:00 UTC
  workflow_dispatch:
    inputs:
      max_issues:
        description: 'Max Sentry issues to attempt fixes for (default 5)'
        required: false
        default: '5'
        type: string
      dry_run:
        description: 'Dry run — surface issues but do not open PRs'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: sentry-triage
  cancel-in-progress: false

jobs:
  triage:
    name: Triage + draft fixes
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ vars.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Validate required secrets
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is not set"
            exit 1
          fi
          if [ -z "$SENTRY_AUTH_TOKEN" ]; then
            echo "::error::SENTRY_AUTH_TOKEN secret is not set"
            exit 1
          fi

      - name: Run Claude triage
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt_file: scripts/prompts/sentry-triage.md
          allowed_tools: |
            Bash(gh *)
            Bash(git *)
            Bash(./gradlew *)
            Bash(curl *)
            Edit
            Write
            Read
            Grep
            Glob
        env:
          MAX_ISSUES: ${{ inputs.max_issues || '5' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
