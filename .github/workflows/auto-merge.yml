name: Auto-merge

on:
  pull_request:
    types: [labeled, opened, synchronize, reopened, ready_for_review]
  check_suite:
    types: [completed]
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  autofix:
    name: Enable auto-merge on ai-autofix PRs
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'ai-autofix') && !github.event.pull_request.draft
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --repo "$GITHUB_REPOSITORY" \
            --squash \
            --auto \
            --delete-branch
