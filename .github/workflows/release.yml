name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      changelog:
        description: 'Optional TestFlight/Play changelog override'
        required: false
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  android:
    name: Android AAB
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Android signing secrets
        run: |
          missing=0
          for var in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "::error::Secret $var is not set"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ]

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Bundle release AAB
        run: ./gradlew :apps:compose:bundleRelease -Prelease.signing=true

      - name: Build release APK (for sideload verification)
        run: ./gradlew :apps:compose:assembleRelease -Prelease.signing=true

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: apps/compose/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 90

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apps/compose/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 90

  ios:
    name: iOS TestFlight
    runs-on: macos-15
    timeout-minutes: 60

    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
      FASTLANE_SKIP_UPDATE_CHECK: "1"
      FASTLANE_HIDE_CHANGELOG: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode 16
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -n 1)
          if [ -z "$XCODE_PATH" ]; then
            echo "::error::No Xcode 16.x found on runner"
            ls /Applications | grep -i xcode
            exit 1
          fi
          echo "Using $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"

      - name: Print Xcode version
        run: xcodebuild -version

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Kotlin/Native (~/.konan)
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            konan-${{ runner.os }}-

      - name: Cache Swift Package Manager
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('apps/ios/iosApp.xcodeproj/project.pbxproj', 'apps/ios/iosApp.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Set up Ruby / Bundler
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: apps/ios

      - name: Populate TEAM_ID in xcconfig
        working-directory: apps/ios/Configuration
        run: |
          if [ -z "${APPLE_TEAM_ID}" ]; then
            echo "::error::APPLE_TEAM_ID secret is not set."
            exit 1
          fi
          tmpfile=$(mktemp)
          awk -v team="${APPLE_TEAM_ID}" '
            /^TEAM_ID[[:space:]]*=/ { print "TEAM_ID=" team; next }
            { print }
          ' Config.xcconfig > "$tmpfile"
          mv "$tmpfile" Config.xcconfig
          echo "--- Config.xcconfig ---"
          cat Config.xcconfig

      - name: Build + upload to TestFlight
        working-directory: apps/ios
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          TESTFLIGHT_CHANGELOG: ${{ inputs.changelog }}
        run: bundle exec fastlane beta

      - name: Upload ipa artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: apps/ios/build/*.ipa
          if-no-files-found: ignore
          retention-days: 90

  github-release:
    name: Publish GitHub Release
    needs: [android, ios]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Android AAB
        uses: actions/download-artifact@v4
        with:
          name: android-aab
          path: artifacts/android-aab

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/android-apk

      - name: Download iOS IPA
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: artifacts/ios-ipa
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/android-aab/*.aab
            artifacts/android-apk/*.apk
            artifacts/ios-ipa/*.ipa
          fail_on_unmatched_files: false
