# ─────────────────────────────────────────────────────────────────────────────
# PR gate + preview builds on main.
#
# Fires on:     PRs and pushes to main (ignores docs-only changes and
#               CHANGELOG.md, since release-please commits to CHANGELOG.md).
# Jobs:         build-and-test — compiles Android+iOS Kotlin targets and runs
#                                 unit tests. Blocks PR merges if it fails.
#               ios-preview    — (main pushes only) signs + uploads to
#                                 TestFlight internal so the maintainer can
#                                 dogfood every merge. Costs macOS minutes.
# Side effects: TestFlight internal build appears in App Store Connect after
#               every main push. External testers are NOT notified — that
#               only happens via release.yml on tag pushes.
# Edit to change: compile commands, test task, or the `ios-preview` job's
#                 `if:` condition if per-merge previews become noisy.
# See: docs/release-automation.md
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'CHANGELOG.md'
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'CHANGELOG.md'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build + test
    # release-please's PR only changes versionName + CHANGELOG — it can't break
    # the build. Skip the expensive macOS run on that branch. The merge commit
    # into main is also a pure bump, so skip it there too.
    if: >
      github.head_ref != 'release-please--branches--main' &&
      !startsWith(github.event.head_commit.message, 'chore: release')
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode 16
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -n 1)
          if [ -z "$XCODE_PATH" ]; then
            echo "::error::No Xcode 16.x found on runner"
            ls /Applications | grep -i xcode
            exit 1
          fi
          echo "Using $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Cache Kotlin/Native (~/.konan)
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            konan-${{ runner.os }}-

      - name: Compile Android + iOS Kotlin targets
        run: ./gradlew :apps:compose:compileDebugKotlinAndroid :apps:compose:compileKotlinIosSimulatorArm64

      - name: Assemble Android debug
        run: ./gradlew :apps:compose:assembleDebug

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

  ios-preview:
    name: iOS TestFlight internal (preview)
    # Skip the preview build when the push is a release-please merge commit —
    # release.yml will build and ship the same code to TestFlight external.
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      !startsWith(github.event.head_commit.message, 'chore: release')
    needs: build-and-test
    runs-on: macos-15
    timeout-minutes: 60

    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
      FASTLANE_SKIP_UPDATE_CHECK: "1"
      FASTLANE_HIDE_CHANGELOG: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode 16
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -n 1)
          echo "Using $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Kotlin/Native (~/.konan)
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            konan-${{ runner.os }}-

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('apps/ios/iosApp.xcodeproj/project.pbxproj', 'apps/ios/iosApp.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Set up Ruby / Bundler
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: apps/ios

      - name: Populate TEAM_ID in xcconfig
        working-directory: apps/ios/Configuration
        run: |
          tmpfile=$(mktemp)
          awk -v team="${APPLE_TEAM_ID}" '
            /^TEAM_ID[[:space:]]*=/ { print "TEAM_ID=" team; next }
            { print }
          ' Config.xcconfig > "$tmpfile"
          mv "$tmpfile" Config.xcconfig

      - name: Build + upload preview to TestFlight internal
        working-directory: apps/ios
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: bundle exec fastlane beta
