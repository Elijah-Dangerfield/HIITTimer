name: Cut release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'patch | minor | major | explicit x.y.z'
        required: true
        default: 'patch'
        type: string

concurrency:
  group: cut-release
  cancel-in-progress: false

jobs:
  cut:
    name: Bump version + tag
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Verify on main
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "::error::cut-release must be triggered from main (got ${{ github.ref }})"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Kotlin compiler
        run: |
          KOTLIN_VERSION=2.1.20
          curl -sSL -o /tmp/kotlin.zip \
            "https://github.com/JetBrains/kotlin/releases/download/v${KOTLIN_VERSION}/kotlin-compiler-${KOTLIN_VERSION}.zip"
          unzip -q /tmp/kotlin.zip -d /opt
          echo "/opt/kotlinc/bin" >> "$GITHUB_PATH"

      - name: Bump version
        id: bump
        run: kotlin scripts/increment-version.main.kts "${{ inputs.bump }}"

      - name: Commit and tag
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          if [ -z "$VERSION" ]; then
            echo "::error::Script did not emit a version output"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add versions.properties apps/ios/Configuration/Config.xcconfig
          git commit -m "Release v${VERSION}"
          git tag "v${VERSION}"
          git push origin HEAD:main
          git push origin "v${VERSION}"

      - name: Summary
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          {
            echo "## Released v${VERSION}"
            echo ""
            echo "- versionCode: ${{ steps.bump.outputs.versionCode }}"
            echo "- buildNumber: ${{ steps.bump.outputs.buildNumber }}"
            echo ""
            echo "The \`v${VERSION}\` tag push will trigger the Release workflow (TestFlight + Android AAB + GitHub Release)."
          } >> "$GITHUB_STEP_SUMMARY"
