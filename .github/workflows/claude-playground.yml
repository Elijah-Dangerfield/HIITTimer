name: Claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: gradle-linux-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-linux-

      - name: Run Claude Code
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch_prefix: playground/
          allowed_tools: Bash,Read,Edit,Write,Glob,Grep
          additional_instructions: |
            You are running on a Linux GitHub Actions runner. Conventions:
            - Follow AGENTS.md rules strictly. No Material3 components directly — always use the design system in libraries/ui.
            - Use Catching { } from libraries/core instead of runCatching.
            - No comments in code.
            - For any non-trivial change, verify compilation before pushing:
              ./gradlew :apps:compose:compileDebugKotlinAndroid
              ./gradlew :apps:compose:compileKotlinIosSimulatorArm64
            - You CANNOT run xcodebuild on this Linux runner. iOS device builds are verified downstream by the ios-testflight workflow.
            - Work on a branch named playground/<issue-number>. Open a pull request when done.
            - If the requested change is ambiguous, ask a clarifying question in the thread instead of guessing.
